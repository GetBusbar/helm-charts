# CI: minimal bootable config for the default (stateless Deployment) path.
# A dummy provider key satisfies the ${VAR} startup check; no upstream is called.
config:
  providers:
    anthropic:
      api_key_env: ANTHROPIC_KEY
  models:
    claude-sonnet:
      provider: anthropic
      max_concurrent: 20
      max_requests: -1
secrets:
  create: true
  data:
    ANTHROPIC_KEY: ci-dummy-anthropic-key
