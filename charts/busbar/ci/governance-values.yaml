# CI: governance path — StatefulSet + PVC, requires an admin token.
config:
  providers:
    anthropic:
      api_key_env: ANTHROPIC_KEY
  models:
    claude-sonnet:
      provider: anthropic
      max_concurrent: 20
      max_requests: -1
secrets:
  create: true
  data:
    ANTHROPIC_KEY: ci-dummy-anthropic-key
    BUSBAR_ADMIN_TOKEN: ci-dummy-admin-token
governance:
  enabled: true
  persistence:
    size: 1Gi
