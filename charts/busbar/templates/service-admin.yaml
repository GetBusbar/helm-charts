{{- if .Values.service.admin.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "busbar.fullname" . }}-admin
  labels:
    {{- include "busbar.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  type: {{ .Values.service.admin.type }}
  selector:
    {{- include "busbar.selectorLabels" . | nindent 4 }}
  ports:
    - name: admin
      port: {{ .Values.service.admin.port }}
      targetPort: admin
      protocol: TCP
{{- end }}
