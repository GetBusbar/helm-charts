{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "busbar.fullname" . }}
  labels:
    {{- include "busbar.labels" . | nindent 4 }}
type: Opaque
{{- with .Values.secrets.data }}
stringData:
  {{- range $k, $v := . }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
{{- end }}
