apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "busbar.fullname" . }}-test-connection"
  labels:
    {{- include "busbar.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: healthz
      image: curlimages/curl:8.11.0
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      command: ["curl"]
      args:
        - "--fail"
        - "--show-error"
        - "--silent"
        - "{{ if .Values.dataTLS.enabled }}https{{ else }}http{{ end }}://{{ include "busbar.fullname" . }}-data:{{ .Values.service.data.port }}/healthz"
        {{- if .Values.dataTLS.enabled }}
        - "--insecure"
        {{- end }}
