{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "busbar.fullname" . }}-admin
  labels:
    {{- include "busbar.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "busbar.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Restrict admin plane (8081) to the allowed namespaces only.
    - from:
        {{- range .Values.networkPolicy.admin.allowedNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 8081
    # Data plane (8080) stays open to all sources.
    - ports:
        - protocol: TCP
          port: 8080
{{- end }}
