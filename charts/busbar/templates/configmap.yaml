{{- include "busbar.validateAdmin" . -}}
{{- include "busbar.validateGovernance" . -}}
{{- if not .Values.existingConfigMap -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "busbar.fullname" . }}
  labels:
    {{- include "busbar.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- /* Chart-managed listeners: never taken from .Values.config */}}
    listen: "0.0.0.0:8080"
    admin_listen: "{{ include "busbar.adminListen" . }}"
    {{- if .Values.adminInsecure }}
    admin_insecure: true
    {{- end }}
    {{- if .Values.adminTLS.enabled }}
    admin_tls:
      cert_file: /etc/busbar/tls/admin/tls.crt
      key_file: /etc/busbar/tls/admin/tls.key
      {{- /* busbar's boot-guard requires client_ca_file (real mTLS), not just server TLS.
             With an explicit client CA, use it. Otherwise fall back to the ca.crt that
             cert-manager writes into the server-cert Secret (the issuing CA) so mTLS works
             out of the box: admin clients present certs signed by that same CA. */}}
      {{- if .Values.adminTLS.clientCASecret }}
      client_ca_file: /etc/busbar/tls/admin-ca/ca.crt
      {{- else if .Values.adminTLS.certManager.enabled }}
      client_ca_file: /etc/busbar/tls/admin/ca.crt
      {{- end }}
    {{- end }}
    {{- if .Values.dataTLS.enabled }}
    tls:
      cert_file: /etc/busbar/tls/data/tls.crt
      key_file: /etc/busbar/tls/data/tls.key
    {{- end }}
    {{- if .Values.governance.enabled }}
    governance:
      enabled: true
      db_path: {{ .Values.governance.dbPath | quote }}
      admin_token: ${{ printf "{%s}" .Values.governance.adminTokenEnv }}
    {{- end }}
    {{- with .Values.config }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.providersCatalog }}
  providers.yaml: |
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
