name: Lint and Test Charts

on:
  pull_request:
    branches:
      - main

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch main)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        run: ct lint --target-branch main --check-version-increment=false

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1.12.0

      # cert-manager + a CA ClusterIssuer named "busbar-ca" so the ci/admin-mtls
      # install test can exercise the exposed-admin-plane mTLS path end to end.
      - name: Install cert-manager
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.2/cert-manager.yaml
          kubectl -n cert-manager wait --for=condition=Available deploy --all --timeout=300s

      - name: Create the busbar-ca ClusterIssuer
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata: { name: selfsigned }
          spec: { selfSigned: {} }
          ---
          apiVersion: cert-manager.io/v1
          kind: Certificate
          metadata: { name: busbar-ca, namespace: cert-manager }
          spec:
            isCA: true
            commonName: busbar-ca
            secretName: busbar-ca
            privateKey: { algorithm: ECDSA, size: 256 }
            issuerRef: { name: selfsigned, kind: ClusterIssuer, group: cert-manager.io }
          ---
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata: { name: busbar-ca }
          spec:
            ca: { secretName: busbar-ca }
          EOF
          kubectl -n cert-manager wait --for=condition=Ready certificate/busbar-ca --timeout=120s

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --target-branch main
